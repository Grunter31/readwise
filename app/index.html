<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReadWise — Start Your Reading Adventure</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;500;600;700&family=Lora:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@400;500;600&display=swap"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #FAF7F2; --cream-dark: #F0EBE1;
    --forest: #1A5C3A; --forest-mid: #2A7A50;
    --forest-light: #D6EDE0; --forest-xlight: #EDF7F2;
    --amber: #D97706; --amber-light: #FEF3C7;
    --ink: #1C1C1C; --ink-mid: #4A4A4A; --ink-soft: #7A7A7A;
    --white: #FFFFFF; --border: rgba(28,28,28,0.09);
    --teal: #1D9E75; --teal-dark: #0F6E56;
    --orange: #EF9F27; --red-warm: #D85A30;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; }
 
  /* NAV */
  nav { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 6%; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
  .nav-logo { font-family: 'Lora', serif; font-weight: 700; font-size: 20px; color: var(--forest); text-decoration: none; }
  .nav-logo span { color: var(--ink); }
  .nav-back { font-size: 14px; color: var(--ink-soft); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
  .nav-back:hover { color: var(--forest); }
 
  /* MAIN WRAPPER */
  .app-wrap { max-width: 640px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
 
  /* SCREENS */
  .screen { animation: fadeUp 0.35s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
 
  /* WELCOME SCREEN */
  .welcome-hero { text-align: center; margin-bottom: 2rem; }
  .welcome-icon { font-size: 52px; margin-bottom: 1rem; display: block; }
  .welcome-hero h1 { font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 32px; color: var(--ink); margin-bottom: 0.5rem; line-height: 1.2; }
  .welcome-hero p { font-size: 17px; color: var(--ink-mid); line-height: 1.65; max-width: 420px; margin: 0 auto; }
  .welcome-card { background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; margin-bottom: 1rem; }
  .field-label { display: block; font-size: 13px; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .text-input { width: 100%; padding: 13px 16px; font-family: 'DM Sans', sans-serif; font-size: 17px; border: 1.5px solid var(--border); border-radius: 12px; background: var(--cream); color: var(--ink); outline: none; transition: border-color 0.2s; }
  .text-input:focus { border-color: var(--teal); background: var(--white); }
  .age-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .age-btn { padding: 9px 18px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--cream); color: var(--ink-mid); font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.15s; }
  .age-btn:hover { border-color: var(--teal); color: var(--teal); }
  .age-btn.selected { background: var(--teal); color: var(--white); border-color: var(--teal); }
  .field-gap { height: 20px; }
  .how-it-works { background: var(--forest-xlight); border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; }
  .how-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
  .how-row:last-child { margin-bottom: 0; }
  .how-num { width: 26px; height: 26px; border-radius: 8px; background: var(--forest-light); color: var(--forest); font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .how-text { font-size: 14px; color: var(--ink-mid); line-height: 1.55; }
  .how-text strong { color: var(--ink); font-weight: 600; }
  .error-box { background: #FAECE7; border-radius: 10px; padding: 10px 14px; color: #993C1D; font-size: 14px; margin-top: 10px; }
 
  /* BUTTONS */
  .btn-main { width: 100%; padding: 16px; background: var(--teal); color: var(--white); border: none; border-radius: 14px; font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 18px; cursor: pointer; transition: transform 0.1s, opacity 0.15s, box-shadow 0.15s; box-shadow: 0 4px 20px rgba(29,158,117,0.28); }
  .btn-main:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(29,158,117,0.34); }
  .btn-main:active { transform: scale(0.98); }
  .btn-main:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-ghost { background: transparent; border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 20px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--ink-mid); cursor: pointer; transition: all 0.15s; }
  .btn-ghost:hover { background: var(--cream-dark); border-color: var(--ink-soft); }
  .btn-row { display: flex; gap: 10px; margin-top: 12px; }
  .btn-row .btn-ghost { flex: 0 0 auto; }
  .btn-row .btn-main { flex: 1; }
 
  /* LOADING */
  .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; }
  .loading-icon { font-size: 48px; margin-bottom: 1rem; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  .loading-wrap h2 { font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 24px; color: var(--ink); margin-bottom: 6px; }
  .loading-wrap p { font-size: 15px; color: var(--ink-soft); }
  .dots { display: flex; gap: 6px; justify-content: center; margin-top: 1.5rem; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--teal); animation: bounce 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.2)} }
 
  /* READING SCREEN */
  .story-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--forest-light); color: var(--forest); padding: 5px 14px; border-radius: 99px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }
  .story-title { font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 26px; color: var(--ink); margin-bottom: 1.25rem; line-height: 1.2; }
  .story-card { background: var(--white); border: 1px solid var(--border); border-left: 4px solid var(--teal); border-radius: 16px; padding: 1.75rem; margin-bottom: 1.25rem; }
  .story-text { font-size: 18px; line-height: 1.9; color: var(--ink); font-family: 'Nunito', sans-serif; font-weight: 500; }
  .story-hint { background: var(--amber-light); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; display: flex; align-items: flex-start; gap: 10px; }
  .story-hint p { font-size: 14px; color: #633806; line-height: 1.55; }
  .story-hint p strong { font-weight: 700; }
 
  /* QUESTION SCREEN */
  .progress-header { margin-bottom: 1.5rem; }
  .progress-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .progress-meta span { font-size: 13px; color: var(--ink-soft); font-weight: 500; }
  .progress-level { display: inline-flex; align-items: center; gap: 5px; background: var(--forest-light); color: var(--forest); padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 700; }
  .progress-track { height: 6px; background: var(--cream-dark); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; background: var(--teal); transition: width 0.4s ease; }
  .question-card { background: var(--white); border: 1px solid var(--border); border-radius: 18px; padding: 1.75rem; margin-bottom: 1rem; }
  .question-level-tag { font-size: 11px; font-weight: 700; color: var(--teal); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .question-text { font-size: 19px; font-weight: 600; color: var(--ink); line-height: 1.5; font-family: 'Nunito', sans-serif; }
  .answer-area { width: 100%; padding: 14px 16px; font-family: 'Nunito', sans-serif; font-size: 16px; line-height: 1.65; border: 1.5px solid var(--border); border-radius: 12px; background: var(--white); color: var(--ink); outline: none; resize: vertical; min-height: 100px; transition: border-color 0.2s; }
  .answer-area:focus { border-color: var(--teal); }
  .answer-area::placeholder { color: var(--ink-soft); }
  .reread-link { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; color: var(--ink-soft); background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 8px; transition: color 0.2s; }
  .reread-link:hover { color: var(--forest); }
 
  /* RESULTS SCREEN */
  .results-hero { text-align: center; margin-bottom: 2rem; }
  .results-hero-icon { font-size: 54px; display: block; margin-bottom: 0.75rem; }
  .results-hero h2 { font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 28px; color: var(--ink); margin-bottom: 4px; }
  .results-hero p { font-size: 15px; color: var(--ink-soft); }
  .superpower-card { background: var(--amber-light); border-radius: 16px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 14px; }
  .superpower-card .sp-icon { font-size: 28px; flex-shrink: 0; }
  .superpower-card .sp-label { font-size: 11px; font-weight: 700; color: var(--amber); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
  .superpower-card .sp-text { font-size: 17px; font-weight: 700; color: #412402; }
  .profile-card { background: var(--white); border: 1px solid var(--border); border-radius: 18px; padding: 1.5rem; margin-bottom: 1rem; }
  .profile-card-title { font-size: 12px; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1.25rem; }
  .bar-row { margin-bottom: 14px; }
  .bar-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  .bar-name { font-size: 14px; font-weight: 600; color: var(--ink); }
  .bar-score { font-size: 13px; font-weight: 700; }
  .bar-track { height: 8px; background: var(--cream-dark); border-radius: 99px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width 0.8s ease; }
  .bar-obs { font-size: 13px; color: var(--ink-soft); line-height: 1.5; margin-top: 5px; }
  .gap-card { background: var(--forest-light); border-radius: 16px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  .gap-card .gap-label { font-size: 11px; font-weight: 700; color: var(--forest); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .gap-card .gap-text { font-size: 16px; color: #04342C; line-height: 1.6; font-weight: 500; }
  .encourage-card { background: var(--white); border: 1px solid var(--border); border-radius: 18px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .encourage-card p { font-size: 16px; color: var(--ink-mid); line-height: 1.8; font-style: italic; }
  .encourage-card p strong { color: var(--ink); font-style: normal; }
  .results-actions { display: flex; flex-direction: column; gap: 10px; }
  .btn-again { width: 100%; padding: 15px; background: var(--forest); color: var(--white); border: none; border-radius: 14px; font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 17px; cursor: pointer; transition: all 0.15s; box-shadow: 0 4px 20px rgba(26,92,58,0.25); }
  .btn-again:hover { background: var(--forest-mid); transform: translateY(-1px); }
  .btn-home { width: 100%; padding: 14px; background: transparent; color: var(--ink-mid); border: 1.5px solid var(--border); border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; text-decoration: none; display: block; text-align: center; transition: all 0.15s; }
  .btn-home:hover { background: var(--cream-dark); }
  .elle-footer { background: var(--forest); border-radius: 18px; padding: 1.5rem; margin-top: 1rem; display: flex; align-items: center; gap: 14px; }
  .elle-footer-photo { width: 48px; height: 48px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.25); background: var(--forest-light); }
  .elle-footer-photo img { width: 100%; height: 100%; object-fit: cover; }
  .elle-footer p { font-size: 14px; color: rgba(255,255,255,0.8); line-height: 1.6; }
  .elle-footer strong { color: var(--white); font-weight: 600; }
</style>
</head>
<body>
 
<!-- NAV -->
<nav>
  <a href="/" class="nav-logo">Read<span>Wise</span></a>
  <a href="/" class="nav-back">← Back to ReadWise</a>
</nav>
 
<!-- APP -->
<div class="app-wrap" id="app"></div>
 
<script>
const API_URL = "https://api.anthropic.com/v1/messages";
 
let state = {
  screen: 'welcome',
  name: '',
  age: 8,
  passage: null,
  questions: [],
  currentQ: 0,
  answers: [],
  currentAnswer: '',
  diagnosis: null,
  loadingMsg: '',
  error: ''
};
 
function setState(updates) {
  state = { ...state, ...updates };
  render();
}
 
async function callAPI(prompt) {
  const resp = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!resp.ok) throw new Error('API error ' + resp.status);
  const data = await resp.json();
  const text = data.content.map(b => b.text || '').join('');
  return JSON.parse(text.replace(/```json\n?|```\n?/g, '').trim());
}
 
async function startSession() {
  const name = state.name.trim();
  if (!name) { setState({ error: 'Please enter your name first!' }); return; }
  setState({ screen: 'loading', loadingMsg: `Creating your story, ${name}!`, error: '' });
  try {
    const result = await callAPI(`Create a reading comprehension session for a ${state.age}-year-old child named ${name}.
 
Write a warm, engaging story (90-110 words, age-appropriate for ${state.age}) and 5 comprehension questions at different depths.
 
Return ONLY valid JSON, no markdown fences:
{
  "title": "Story Title Here",
  "passage": "Full story text here. Make it genuinely interesting and age-appropriate. Avoid anything scary or sad.",
  "questions": [
    {"level": 1, "levelName": "Finding Facts", "question": "A literal question directly answered in the text"},
    {"level": 2, "levelName": "Word Power", "question": "What does the word [pick a word from the story] mean in this story?"},
    {"level": 3, "levelName": "Reading Between the Lines", "question": "An inference question about something implied but not stated"},
    {"level": 4, "levelName": "Big Ideas", "question": "What is the main message or lesson of this story?"},
    {"level": 5, "levelName": "Your Take", "question": "Do you agree with what a character did in the story? Why or why not?"}
  ]
}`);
    setState({ passage: result, screen: 'reading', error: '' });
  } catch(e) {
    setState({ screen: 'welcome', error: 'Something went wrong. Please check your internet and try again.' });
  }
}
 
async function runDiagnosis(answers) {
  setState({ screen: 'loading', loadingMsg: 'Building your reading profile...' });
  const qa = state.passage.questions.map((q, i) =>
    `Level ${q.level} (${q.levelName}):\nQ: ${q.question}\nA: ${answers[i]}`
  ).join('\n\n');
  try {
    const result = await callAPI(`A ${state.age}-year-old child named ${state.name} read this story:
 
"${state.passage.passage}"
 
Their answers to 5 comprehension questions:
${qa}
 
Analyse their comprehension carefully and honestly. Be warm and encouraging but accurate.
 
Return ONLY valid JSON:
{
  "levels": [
    {"level": 1, "name": "Finding Facts", "score": 85, "observation": "2 friendly sentences about their performance at this level"},
    {"level": 2, "name": "Word Power", "score": 70, "observation": "2 friendly sentences"},
    {"level": 3, "name": "Reading Between the Lines", "score": 45, "observation": "2 friendly sentences"},
    {"level": 4, "name": "Big Ideas", "score": 35, "observation": "2 friendly sentences"},
    {"level": 5, "name": "Your Take", "score": 60, "observation": "2 friendly sentences"}
  ],
  "superpower": "5 word phrase describing their strongest reading skill",
  "rootGap": "One clear sentence: the most important comprehension skill to develop next",
  "encouragement": "3 warm sentences written directly to ${state.name} — personal, specific to their answers, and genuinely motivating"
}`);
    setState({ diagnosis: result, screen: 'results', answers });
  } catch(e) {
    setState({ screen: 'questions', error: 'Could not create your profile. Please try again.' });
  }
}
 
function submitAnswer(skip) {
  const ans = skip ? '(skipped)' : (state.currentAnswer.trim() || '(no answer)');
  const newAnswers = [...state.answers, ans];
  if (state.currentQ + 1 >= state.passage.questions.length) {
    runDiagnosis(newAnswers);
  } else {
    setState({ answers: newAnswers, currentQ: state.currentQ + 1, currentAnswer: '', error: '' });
  }
}
 
function getBarColor(score) {
  if (score >= 70) return { fill: '#1D9E75', text: '#085041' };
  if (score >= 45) return { fill: '#EF9F27', text: '#633806' };
  return { fill: '#D85A30', text: '#993C1D' };
}
 
function resetApp() {
  setState({ screen: 'welcome', name: '', age: 8, passage: null, questions: [], currentQ: 0, answers: [], currentAnswer: '', diagnosis: null, error: '' });
}
 
function render() {
  const app = document.getElementById('app');
  const s = state;
 
  // ── WELCOME ──
  if (s.screen === 'welcome') {
    app.innerHTML = `
<div class="screen">
  <div class="welcome-hero">
    <span class="welcome-icon">📖</span>
    <h1>Your Reading Adventure Starts Here</h1>
    <p>A story made just for you, five questions, and a complete picture of your reading superpowers.</p>
  </div>
 
  <div class="welcome-card">
    <label class="field-label" for="nameInput">What's your name?</label>
    <input class="text-input" id="nameInput" type="text" placeholder="Type your name here..." value="${s.name}" maxlength="30" autocomplete="off"/>
 
    <div class="field-gap"></div>
 
    <label class="field-label">How old are you?</label>
    <div class="age-row">
      ${[5,6,7,8,9,10,11,12].map(a => `
        <button class="age-btn ${s.age === a ? 'selected' : ''}" onclick="setState({age:${a}})">${a}</button>
      `).join('')}
    </div>
 
    ${s.error ? `<div class="error-box">${s.error}</div>` : ''}
 
    <div class="field-gap"></div>
    <button class="btn-main" onclick="startSession()">Create my story →</button>
  </div>
 
  <div class="how-it-works">
    <div class="how-row">
      <div class="how-num">1</div>
      <div class="how-text"><strong>Read a story</strong> written just for your age</div>
    </div>
    <div class="how-row">
      <div class="how-num">2</div>
      <div class="how-text"><strong>Answer 5 questions</strong> about what you read</div>
    </div>
    <div class="how-row">
      <div class="how-num">3</div>
      <div class="how-text"><strong>Get your reading profile</strong> — your superpower and next step</div>
    </div>
  </div>
</div>`;
    const input = document.getElementById('nameInput');
    input.addEventListener('input', e => { state.name = e.target.value; });
    input.addEventListener('keydown', e => { if (e.key === 'Enter') startSession(); });
    input.focus();
  }
 
  // ── LOADING ──
  else if (s.screen === 'loading') {
    app.innerHTML = `
<div class="screen loading-wrap">
  <div class="loading-icon">✨</div>
  <h2>${s.loadingMsg}</h2>
  <p>Just a moment${s.name ? ', ' + s.name : ''}...</p>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>`;
  }
 
  // ── READING ──
  else if (s.screen === 'reading' && s.passage) {
    app.innerHTML = `
<div class="screen">
  <div class="story-badge">📚 Your story</div>
  <h2 class="story-title">${s.passage.title}</h2>
 
  <div class="story-card">
    <p class="story-text">${s.passage.passage}</p>
  </div>
 
  <div class="story-hint">
    <p>💡 <strong>Read carefully!</strong> There will be ${s.passage.questions.length} questions about this story. You can come back and re-read it anytime during the questions.</p>
  </div>
 
  <button class="btn-main" onclick="setState({screen:'questions', currentQ:0, answers:[], currentAnswer:'', error:''})">
    I'm ready for the questions →
  </button>
</div>`;
  }
 
  // ── QUESTIONS ──
  else if (s.screen === 'questions' && s.passage) {
    const q = s.passage.questions[s.currentQ];
    const total = s.passage.questions.length;
    const pct = Math.round((s.currentQ / total) * 100);
    const isLast = s.currentQ + 1 >= total;
 
    app.innerHTML = `
<div class="screen">
  <div class="progress-header">
    <div class="progress-meta">
      <span>Question ${s.currentQ + 1} of ${total}</span>
      <span class="progress-level">Level ${q.level} — ${q.levelName}</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>
  </div>
 
  <div class="question-card">
    <div class="question-level-tag">Level ${q.level} · ${q.levelName}</div>
    <p class="question-text">${q.question}</p>
  </div>
 
  <textarea
    class="answer-area"
    id="answerBox"
    placeholder="Write your answer here — there are no wrong answers, just write what you think..."
  >${s.currentAnswer}</textarea>
 
  ${s.error ? `<div class="error-box" style="margin-top:8px">${s.error}</div>` : ''}
 
  <div class="btn-row">
    <button class="btn-ghost" onclick="submitAnswer(true)">Skip</button>
    <button class="btn-main" onclick="handleAnswer()">
      ${isLast ? 'See my reading profile →' : 'Next question →'}
    </button>
  </div>
 
  <button class="reread-link" onclick="setState({screen:'reading'})">← Re-read the story</button>
</div>`;
 
    const ta = document.getElementById('answerBox');
    ta.addEventListener('input', e => { state.currentAnswer = e.target.value; });
    ta.focus();
  }
 
  // ── RESULTS ──
  else if (s.screen === 'results' && s.diagnosis) {
    const d = s.diagnosis;
    const bars = d.levels.map(lv => {
      const col = getBarColor(lv.score);
      return `
<div class="bar-row">
  <div class="bar-meta">
    <span class="bar-name">${lv.name}</span>
    <span class="bar-score" style="color:${col.text}">${lv.score}%</span>
  </div>
  <div class="bar-track">
    <div class="bar-fill" style="width:${lv.score}%;background:${col.fill}"></div>
  </div>
  <div class="bar-obs">${lv.observation}</div>
</div>`;
    }).join('');
 
    app.innerHTML = `
<div class="screen">
  <div class="results-hero">
    <span class="results-hero-icon">🌟</span>
    <h2>${s.name}'s Reading Profile</h2>
    <p>Here's what we discovered today</p>
  </div>
 
  <div class="superpower-card">
    <div class="sp-icon">⚡</div>
    <div>
      <div class="sp-label">Reading superpower</div>
      <div class="sp-text">${d.superpower}</div>
    </div>
  </div>
 
  <div class="profile-card">
    <div class="profile-card-title">Comprehension map</div>
    ${bars}
  </div>
 
  <div class="gap-card">
    <div class="gap-label">→ Next adventure</div>
    <div class="gap-text">${d.rootGap}</div>
  </div>
 
  <div class="encourage-card">
    <p>${d.encouragement}</p>
  </div>
 
  <div class="results-actions">
    <button class="btn-again" onclick="startNewStory()">Try another story →</button>
    <a href="/" class="btn-home">← Back to ReadWise</a>
  </div>
 
  <div class="elle-footer">
    <div class="elle-footer-photo">
      <img src="https://flyingstartfamilydaycare.com.au/wp-content/uploads/2026/03/Ladawans-Website-Photo.jpg" alt="Elle" onerror="this.style.display='none'"/>
    </div>
    <p><strong>From Elle at Flying Start:</strong> Well done for completing your reading adventure. Every session makes you a stronger reader. Keep going!</p>
  </div>
</div>`;
  }
}
 
function handleAnswer() {
  submitAnswer(false);
}
 
function startNewStory() {
  setState({ screen: 'loading', loadingMsg: `Creating a new story for you, ${state.name}!`, passage: null, questions: [], currentQ: 0, answers: [], currentAnswer: '', diagnosis: null, error: '' });
  startSession();
}
 
// kick it off
render();
</script>
</body>
</html>
