<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReadWise — Your Personal Reading Tutor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FAF7F2;--cream-dark:#F0EBE1;
  --forest:#1A5C3A;--forest-mid:#2A7A50;--forest-light:#D6EDE0;--forest-xlight:#EDF7F2;
  --amber:#D97706;--amber-light:#FEF3C7;
  --ink:#1C1C1C;--ink-mid:#4A4A4A;--ink-soft:#7A7A7A;
  --white:#FFFFFF;--border:rgba(28,28,28,0.09);
  --teal:#1D9E75;--teal-dark:#0F6E56;
  --orange:#EF9F27;--red:#D85A30;
  --purple:#7C3AED;--purple-light:#EDE9FE;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Baloo 2',cursive;font-weight:800;font-size:22px;color:var(--forest);text-decoration:none}
.nav-logo span{color:var(--ink)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-badge{background:var(--forest-light);color:var(--forest);padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700;display:none}
.app{max-width:680px;margin:0 auto;padding:1.5rem 1rem 5rem}
.screen{animation:fadeUp 0.35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* WELCOME */
.welcome-hero{text-align:center;padding:1.5rem 0 1.25rem}
.welcome-emoji{font-size:52px;display:block;margin-bottom:0.75rem}
.welcome-hero h1{font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(24px,5vw,34px);color:var(--ink);margin-bottom:0.4rem;line-height:1.2}
.welcome-hero p{font-size:16px;color:var(--ink-mid);max-width:420px;margin:0 auto;line-height:1.65}
.card{background:var(--white);border:1px solid var(--border);border-radius:18px;padding:1.5rem;margin-bottom:1rem}
.field-label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:7px}
.text-input{width:100%;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:17px;border:1.5px solid var(--border);border-radius:11px;background:var(--cream);color:var(--ink);outline:none;transition:border-color 0.2s}
.text-input:focus{border-color:var(--teal);background:var(--white)}
.age-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.age-btn{padding:8px 15px;border-radius:9px;border:1.5px solid var(--border);background:var(--cream);color:var(--ink-mid);font-family:'Baloo 2',cursive;font-weight:700;font-size:14px;cursor:pointer;transition:all 0.14s}
.age-btn:hover{border-color:var(--teal);color:var(--teal)}
.age-btn.sel{background:var(--teal);color:var(--white);border-color:var(--teal)}
.gap{height:16px}
.btn-main{width:100%;padding:15px;background:var(--teal);color:var(--white);border:none;border-radius:13px;font-family:'Baloo 2',cursive;font-weight:700;font-size:17px;cursor:pointer;transition:all 0.14s;box-shadow:0 4px 18px rgba(29,158,117,0.26)}
.btn-main:hover{background:var(--teal-dark);transform:translateY(-1px)}
.btn-main:active{transform:scale(0.98)}
.btn-main:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.error-box{background:#FAECE7;border-radius:9px;padding:9px 13px;color:#993C1D;font-size:14px;margin-top:9px}

/* LEVEL CARDS */
.level-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:1rem}
.level-card{background:var(--white);border:2px solid var(--border);border-radius:15px;padding:1.1rem;cursor:pointer;transition:all 0.18s;text-align:left}
.level-card:hover{border-color:var(--teal);transform:translateY(-2px)}
.level-card.sel{border-color:var(--teal);background:var(--forest-xlight)}
.lc-icon{font-size:26px;margin-bottom:7px}
.lc-name{font-family:'Baloo 2',cursive;font-weight:700;font-size:15px;color:var(--ink);margin-bottom:2px}
.lc-desc{font-size:12px;color:var(--ink-soft);line-height:1.45}

/* PASSAGE */
.passage-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:99px;font-size:12px;font-weight:700}
.b-teal{background:var(--forest-light);color:var(--forest)}
.b-amber{background:var(--amber-light);color:var(--amber)}
.passage-title{font-family:'Baloo 2',cursive;font-weight:800;font-size:22px;color:var(--ink);line-height:1.2;margin-bottom:1rem}
.passage-card{background:var(--white);border:1px solid var(--border);border-left:4px solid var(--teal);border-radius:15px;padding:1.5rem;margin-bottom:1rem}
.passage-text{color:var(--ink)}
.passage-tip{background:var(--amber-light);border-radius:11px;padding:0.85rem 1rem;margin-bottom:1rem;font-size:14px;color:#633806;display:flex;gap:9px}
.btn-forest{width:100%;padding:15px;background:var(--forest);color:var(--white);border:none;border-radius:13px;font-family:'Baloo 2',cursive;font-weight:700;font-size:17px;cursor:pointer;transition:all 0.14s;box-shadow:0 4px 18px rgba(26,92,58,0.22)}
.btn-forest:hover{background:var(--forest-mid);transform:translateY(-1px)}

/* TUTOR */
.tutor-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.9rem}
.tutor-left{display:flex;align-items:center;gap:9px}
.tutor-av{width:38px;height:38px;border-radius:50%;background:var(--forest);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.tutor-name{font-size:14px;font-weight:700;color:var(--ink)}
.tutor-status{font-size:12px;color:var(--teal);font-weight:500}
.progress-row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px;color:var(--ink-soft)}
.prog-track{height:5px;background:var(--cream-dark);border-radius:99px;overflow:hidden;margin-bottom:1rem}
.prog-fill{height:100%;border-radius:99px;background:var(--teal);transition:width 0.4s ease}
.chat-win{display:flex;flex-direction:column;gap:11px;margin-bottom:1rem;min-height:100px;max-height:400px;overflow-y:auto;scroll-behavior:smooth}
.msg{display:flex;gap:9px;align-items:flex-start;animation:msgIn 0.28s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.t{flex-direction:row}
.msg.c{flex-direction:row-reverse}
.m-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px}
.m-av.ta{background:var(--forest);color:var(--white)}
.m-av.ca{background:var(--amber-light);color:var(--amber)}
.bubble{max-width:84%;padding:9px 13px;border-radius:13px;font-size:15px;line-height:1.58}
.msg.t .bubble{background:var(--white);border:1px solid var(--border);border-radius:3px 13px 13px 13px;color:var(--ink)}
.msg.c .bubble{background:var(--teal);color:var(--white);border-radius:13px 3px 13px 13px}
.typing-wrap{background:var(--white);border:1px solid var(--border);border-radius:3px 13px 13px 13px;padding:9px 13px;display:flex;gap:5px;align-items:center;width:56px}
.td{width:7px;height:7px;border-radius:50%;background:var(--ink-soft);animation:tb 1.2s infinite}
.td:nth-child(2){animation-delay:0.2s}
.td:nth-child(3){animation-delay:0.4s}
@keyframes tb{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.15)}}
.input-wrap{background:var(--white);border:1.5px solid var(--border);border-radius:15px;padding:10px;display:flex;gap:9px;align-items:flex-end}
.chat-in{flex:1;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--ink);background:transparent;resize:none;min-height:22px;max-height:110px;line-height:1.5}
.chat-in::placeholder{color:var(--ink-soft)}
.send-btn{width:38px;height:38px;border-radius:50%;background:var(--teal);color:var(--white);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.14s;font-size:15px}
.send-btn:hover{background:var(--teal-dark);transform:scale(1.06)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.action-row{display:flex;gap:7px;margin-top:7px;flex-wrap:wrap}
.action-btn{padding:5px 13px;border-radius:99px;border:1px solid var(--border);background:var(--cream);font-size:12px;color:var(--ink-mid);cursor:pointer;transition:all 0.14s;font-family:'DM Sans',sans-serif}
.action-btn:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-light)}
.reread-btn{padding:5px 13px;border-radius:99px;border:1px solid var(--border);background:var(--cream);font-size:12px;color:var(--ink-mid);cursor:pointer;transition:all 0.14s;font-family:'DM Sans',sans-serif}
.reread-btn:hover{border-color:var(--forest);color:var(--forest)}

/* SKILL MAP */
.skill-map{background:var(--white);border:1px solid var(--border);border-radius:15px;padding:1.1rem;margin-top:1rem}
.sm-title{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:11px}
.sk-row{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.sk-row:last-child{margin-bottom:0}
.sk-name{font-size:12px;font-weight:600;color:var(--ink);width:140px;flex-shrink:0}
.sk-track{flex:1;height:6px;background:var(--cream-dark);border-radius:99px;overflow:hidden}
.sk-fill{height:100%;border-radius:99px;transition:width 0.6s ease}
.sk-score{font-size:11px;font-weight:700;width:28px;text-align:right;flex-shrink:0}

/* RESULTS */
.r-hero{text-align:center;padding:1.25rem 0 0.75rem}
.r-icon{font-size:52px;display:block;margin-bottom:0.6rem}
.r-hero h2{font-family:'Baloo 2',cursive;font-weight:800;font-size:26px;color:var(--ink);margin-bottom:3px}
.r-hero p{font-size:14px;color:var(--ink-soft)}
.sp-card{background:var(--amber-light);border-radius:15px;padding:1.1rem 1.4rem;margin-bottom:0.9rem;display:flex;align-items:center;gap:12px}
.sp-icon{font-size:26px;flex-shrink:0}
.sp-label{font-size:11px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:2px}
.sp-text{font-size:16px;font-weight:700;color:#412402}
.r-card{background:var(--white);border:1px solid var(--border);border-radius:17px;padding:1.4rem;margin-bottom:0.9rem}
.r-card-title{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:1.1rem}
.rb-row{margin-bottom:13px}
.rb-row:last-child{margin-bottom:0}
.rb-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.rb-name{font-size:13px;font-weight:600;color:var(--ink)}
.rb-score{font-size:12px;font-weight:700}
.rb-track{height:7px;background:var(--cream-dark);border-radius:99px;overflow:hidden}
.rb-fill{height:100%;border-radius:99px;transition:width 0.8s ease}
.rb-obs{font-size:12px;color:var(--ink-soft);line-height:1.5;margin-top:4px}
.gap-card{background:var(--forest-xlight);border-radius:14px;padding:1.1rem 1.3rem;margin-bottom:0.9rem}
.gap-lbl{font-size:11px;font-weight:700;color:var(--forest);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px}
.gap-txt{font-size:15px;color:#04342C;line-height:1.6;font-weight:500}
.enc-card{background:var(--white);border:1px solid var(--border);border-radius:17px;padding:1.4rem;margin-bottom:1.4rem}
.enc-card p{font-size:15px;color:var(--ink-mid);line-height:1.8;font-style:italic}
.r-btns{display:flex;flex-direction:column;gap:9px}
.btn-again{width:100%;padding:14px;background:var(--forest);color:var(--white);border:none;border-radius:13px;font-family:'Baloo 2',cursive;font-weight:700;font-size:16px;cursor:pointer;transition:all 0.14s;box-shadow:0 4px 18px rgba(26,92,58,0.2)}
.btn-again:hover{background:var(--forest-mid);transform:translateY(-1px)}
.btn-ghost{width:100%;padding:13px;background:transparent;color:var(--ink-mid);border:1.5px solid var(--border);border-radius:13px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:all 0.14s}
.btn-ghost:hover{background:var(--cream-dark)}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;text-align:center}
.l-icon{font-size:46px;animation:pulse 1.5s ease-in-out infinite;margin-bottom:0.9rem}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.loading h2{font-family:'Baloo 2',cursive;font-weight:700;font-size:21px;color:var(--ink);margin-bottom:5px}
.loading p{font-size:14px;color:var(--ink-soft)}
.dots{display:flex;gap:5px;justify-content:center;margin-top:1.2rem}
.dot{width:8px;height:8px;border-radius:50%;background:var(--teal);animation:bounce 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}

@media(max-width:500px){.level-grid{grid-template-columns:1fr}.sk-name{width:110px;font-size:11px}}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Read<span>Wise</span></a>
  <div class="nav-right">
    <span id="navBadge" class="nav-badge"></span>
  </div>
</nav>

<div class="app" id="app"></div>

<script>
const API="/api/tutor";

const LEVELS={
  emergent:{label:"Emergent Reader",ages:"5–6",icon:"🌱",desc:"Simple sentences, picture book style"},
  early:{label:"Early Reader",ages:"7–8",icon:"📗",desc:"Short paragraphs, familiar topics"},
  developing:{label:"Developing Reader",ages:"9–10",icon:"📘",desc:"Richer text, inferential questions"},
  fluent:{label:"Fluent Reader",ages:"11–12",icon:"📚",desc:"Complex ideas, critical evaluation"}
};

const PASSAGES={
  emergent:[
    {
      title:"The Little Cloud",
      text:"Sam the cloud lived high up in the sky. He was small and white and very fluffy. One day Sam saw some children playing in a park below. They looked very hot. Sam felt sad for them. He blew and blew until he made a cool, gentle rain. The children laughed and held out their hands to catch the drops. Sam smiled. Making others happy made him happy too.",
      questions:[
        {id:1,text:"Where did Sam the cloud live?",skill:"Literal Recall",guide:"In the sky / high up in the sky",hints:["Look back at the very first sentence.","The story says Sam lived up very high somewhere.","The first sentence says Sam lived high up in the sky."]},
        {id:2,text:"Why did Sam feel sad?",skill:"Inference",guide:"He saw the children were hot and felt sorry for them",hints:["What did Sam see happening down below?","The children looked very hot. How might Sam have felt seeing that?","Sam saw children who looked very hot. He felt sad because he wanted to help them cool down."]},
        {id:3,text:"What does 'gentle' mean in 'a cool, gentle rain'?",skill:"Vocabulary",guide:"Soft / light / not hard or heavy",hints:["Did the children laugh or run away from the rain?","Gentle is the opposite of rough or hard.","Gentle means soft and light — not too strong."]},
        {id:4,text:"What made Sam happy at the end?",skill:"Main Idea",guide:"Making others happy / helping the children",hints:["Read the very last sentence again.","What had Sam just done before he smiled?","The last line says making others happy made him happy too."]},
        {id:5,text:"Do you think Sam is a kind cloud? Give one reason.",skill:"Critical Thinking",guide:"Any answer with a clear reason",hints:["Did Sam have to help the children?","What does helping without being asked tell us about someone?","Sam chose to help without being asked. That shows kindness."]}
      ]
    },
    {
      title:"The Stuck Jar",
      text:"Lily wanted some jam. She pulled and pulled at the jar lid but it would not move. She tried using a towel. Still stuck. She tried asking her cat, but the cat just blinked. Finally, Lily asked her grandpa. He smiled, ran the lid under hot water for ten seconds, and twisted it open easily. 'How did you know that?' Lily asked. 'I've been stuck before,' said Grandpa.",
      questions:[
        {id:1,text:"What did Lily want to open?",skill:"Literal Recall",guide:"A jar of jam",hints:["Read the very first sentence.","Lily wanted something from a jar.","Lily wanted to open a jar of jam."]},
        {id:2,text:"Why do you think the cat couldn't help?",skill:"Inference",guide:"Cats can't open jars / animals don't understand the problem",hints:["What do cats usually do when you ask them something?","What did the cat actually do when Lily asked?","Cats don't understand human problems — the cat just blinked!"]},
        {id:3,text:"What does 'twisted' mean?",skill:"Vocabulary",guide:"Turned / rotated around",hints:["Think about how you open a jar.","Is twisting the same as pulling or pushing?","Twisted means turned around in a circle — like unscrewing something."]},
        {id:4,text:"What is the main lesson Grandpa is sharing?",skill:"Main Idea",guide:"Experience teaches you things / you learn from being stuck yourself",hints:["What does Grandpa say at the end?","How did Grandpa know the hot water trick?","Grandpa says 'I've been stuck before' — meaning his own experience taught him the answer."]},
        {id:5,text:"Have you ever figured out how to do something after trying many times? Tell me about it.",skill:"Critical Thinking",guide:"Any personal experience showing persistence",hints:["Think of something that was hard at first.","Did you keep trying or ask someone for help?","Everyone gets stuck sometimes — the important thing is what you do next."]}
      ]
    },
    {
      title:"The Bravest Jump",
      text:"It was Mia's first time at the swimming pool. All the other children were jumping off the diving board. Mia stood at the top and looked down. It felt very, very high. Her legs felt wobbly. She took a big breath, closed her eyes, and jumped. The water was cold and bubbly. When she came back up, she was laughing. 'Again!' she shouted.",
      questions:[
        {id:1,text:"Where does this story take place?",skill:"Literal Recall",guide:"At a swimming pool",hints:["Read the first sentence.","Where were all the children?","The story happens at a swimming pool."]},
        {id:2,text:"Why did Mia's legs feel wobbly?",skill:"Inference",guide:"She was scared / nervous / it looked high",hints:["Have you ever felt wobbly legs? When?","What was Mia looking at when her legs felt wobbly?","When people are nervous or scared, their legs can feel shaky. Mia was scared because it looked so high."]},
        {id:3,text:"What does 'wobbly' mean?",skill:"Vocabulary",guide:"Shaky / unsteady / not firm",hints:["Think about a wobbly table — what does it do?","Wobbly is the opposite of steady and still.","Wobbly means shaky and unsteady — Mia's legs were trembling with nerves."]},
        {id:4,text:"How did Mia feel at the end compared to the beginning?",skill:"Main Idea",guide:"At the start she was scared, at the end she was happy and excited / wanted to go again",hints:["What was Mia feeling at the top of the board?","What did she shout after she jumped?","She went from nervous and wobbly to laughing and wanting to go again."]},
        {id:5,text:"Was it brave of Mia to jump? Why?",skill:"Critical Thinking",guide:"Yes — she was scared but did it anyway / bravery means doing something even when you're scared",hints:["Did Mia want to jump right away?","Can you be brave if you're not scared at all?","Bravery isn't about not being scared — it's about doing something even when you are scared."]}
      ]
    }
  ],
  early:[
    {
      title:"The Last Biscuit",
      text:"Maya and her brother Leo were sitting at the kitchen table. There was one biscuit left on the plate. They both reached for it at exactly the same time. 'I saw it first,' said Leo. 'I was here first,' said Maya. Their mother walked in and saw their faces — both grumpy, both stubborn. She picked up the biscuit, broke it in half, and gave a piece to each of them. Maya looked at her half. It was still warm. Actually, it tasted better this way. She glanced at Leo. He was smiling too.",
      questions:[
        {id:1,text:"What were Maya and Leo arguing about?",skill:"Literal Recall",guide:"The last biscuit on the plate",hints:["Read the first three sentences again.","There was something left on the plate...","They were arguing about the last biscuit."]},
        {id:2,text:"How did their mother know they were arguing without being told?",skill:"Inference",guide:"She could see from their faces",hints:["What does the story say the mother saw when she walked in?","The story describes their faces. What were they like?","Their mother saw their faces — both grumpy and stubborn. She could tell just from looking at them."]},
        {id:3,text:"What does 'stubborn' mean?",skill:"Vocabulary",guide:"Refusing to give in / not willing to change their mind",hints:["Both children refused to give up. What describes someone who won't back down?","Stubborn means you stick to what you want even when others disagree.","Stubborn means refusing to give in."]},
        {id:4,text:"Why do you think the biscuit tasted better after it was shared?",skill:"Inference",guide:"Sharing ended the argument / they felt better without the tension",hints:["What changed after they each got a piece?","Before sharing, how were they both feeling?","Before the share, they were grumpy. After, they were smiling. How we feel can change how things taste."]},
        {id:5,text:"What is the main lesson in this story?",skill:"Main Idea",guide:"Sharing is better than arguing / compromise leads to happiness",hints:["Think about what happened at the start compared to the end.","Were they happier before or after the biscuit was split?","The story shows that sharing — even something small — makes everyone happier."]}
      ]
    },
    {
      title:"The New Kid",
      text:"On Monday, a new boy named Ravi arrived in Ms Chen's class. He sat alone at lunch. Jake noticed but didn't say anything. On Tuesday, Ravi sat alone again. On Wednesday, Jake picked up his tray, walked over, and sat down. 'Is this seat taken?' he asked. Ravi looked surprised. Then he smiled. They talked about football the whole lunch break. On Thursday, three other kids joined them. By Friday, the table was full.",
      questions:[
        {id:1,text:"What did Jake notice on Monday?",skill:"Literal Recall",guide:"That Ravi was sitting alone at lunch",hints:["What happened at lunchtime on Monday?","Where was the new boy sitting?","Jake noticed that Ravi was sitting alone at lunch."]},
        {id:2,text:"Why do you think Jake waited until Wednesday to sit with Ravi?",skill:"Inference",guide:"He was nervous / unsure / needed time to build up courage",hints:["Jake noticed on Monday but didn't do anything. What might have stopped him?","Have you ever wanted to do something kind but felt nervous?","Sometimes it takes courage to approach someone new — Jake may have needed time to feel ready."]},

let S={
  screen:'welcome',name:'',age:8,level:null,passage:null,
  chat:[],messages:[],qIndex:0,hintLevel:0,loading:false,loadingMsg:'',
  skills:freshSkills(),result:null,error:''
};

function freshSkills(){return{'Literal Recall':{score:0,attempts:0},'Vocabulary':{score:0,attempts:0},'Inference':{score:0,attempts:0},'Main Idea':{score:0,attempts:0},'Critical Thinking':{score:0,attempts:0}};}

function set(u){S={...S,...u};render();}

async function callAI(messages,system){
  const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,system,messages})});
  if(!r.ok){const err=await r.text();throw new Error(`Status ${r.status}: ${err}`);}
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||'API error');
  return d.content.map(b=>b.text||'').join('');
}

function tutorSystem(){
  const q=S.passage.questions[S.qIndex];
  const isLastQ=S.qIndex>=S.passage.questions.length-1;
  return `You are ReadWise, a warm encouraging reading tutor for ${S.name}, age ${S.age}.

QUESTION ASKED: "${q.text}"
WHAT A CORRECT ANSWER LOOKS LIKE: ${q.guide}
HINTS USED: ${S.hintLevel}
THIS IS THE LAST QUESTION: ${isLastQ}

CRITICAL RULES — READ CAREFULLY:
1. Be VERY GENEROUS when marking correct. If the child shows they understood the key idea — even in simple words — that is CORRECT. Do not demand perfect wording.
2. If answer shows understanding of the key concept → celebrate specifically WHY it is right, then write [NEXT] at the end.
3. If answer is clearly wrong or way off → warmly diagnose why (wrong vocab? missed inference?) and ask ONE gentle follow-up question. Never say "wrong" or "incorrect".
4. If child has attempted 2+ times or used hints → accept a partial answer, praise what they got right, gently add what was missing, then write [NEXT].
5. If this is the last question AND answer is acceptable → end with [DONE] instead of [NEXT].
6. Keep response to 2-3 sentences MAX.
7. Language for age ${S.age}: ${S.age<=7?'very simple, warm, playful — like a kind teacher':S.age<=9?'friendly and clear — like a supportive tutor':S.age<=11?'encouraging and conversational':'thoughtful and intellectually engaged'}
8. NEVER be picky about exact wording. The goal is comprehension, not recitation.
9. Examples of what to accept: "the sky" = correct for "high up in the sky". "she helped them" = correct for "she wanted to help". "nice/kind" = correct for character analysis.`;
}

function diagnosisSystem(){
  return `Generate a reading profile for ${S.name}, age ${S.age}.
Passage: "${S.passage.title}"
Skills: ${JSON.stringify(S.skills)}

Return ONLY valid JSON (no markdown):
{"levels":[{"name":"Literal Recall","score":0-100,"observation":"1-2 sentences specific to this child"},{"name":"Vocabulary","score":0-100,"observation":"..."},{"name":"Inference","score":0-100,"observation":"..."},{"name":"Main Idea","score":0-100,"observation":"..."},{"name":"Critical Thinking","score":0-100,"observation":"..."}],"superpower":"5-7 words: strongest skill","rootGap":"One sentence: most important thing to develop next","encouragement":"3 warm sentences direct to ${S.name} — personal and specific"}`;
}

function handleStart(){
  if(!S.name.trim()){set({error:'Please enter your name first!'});return;}
  const suggested=S.age<=6?'emergent':S.age<=8?'early':S.age<=10?'developing':'fluent';
  set({error:'',level:suggested,screen:'level'});
}

function startSession(){
  if(!S.level)return;
  const available=PASSAGES[S.level];
  const passage=available[Math.floor(Math.random()*available.length)];
  set({screen:'passage',passage});
}

async function beginTutoring(){
  const q=S.passage.questions[0];
  const opening=`Hi ${S.name}! I've read "${S.passage.title}" with you. Let's talk about it!\n\n**${q.text}**`;
  set({
    screen:'tutor',
    chat:[{r:'t',text:opening,type:'q'}],
    messages:[{role:'user',content:'Child is ready. Ask the first question warmly.'},{role:'assistant',content:opening}],
    qIndex:0,hintLevel:0,skills:freshSkills(),result:null,loading:false
  });
}

async function sendAnswer(answer){
  if(!answer.trim()||S.loading)return;
  const newChat=[...S.chat,{r:'c',text:answer}];
  const newMsgs=[...S.messages,{role:'user',content:answer}];
  set({chat:newChat,messages:newMsgs,loading:true});
  showTyping();
  try{
    const resp=await callAI(newMsgs,tutorSystem());
    const isDone=resp.includes('[DONE]');
    const isNext=resp.includes('[NEXT]');
    const clean=resp.replace('[NEXT]','').replace('[DONE]','').trim();
    const updChat=[...newChat,{r:'t',text:clean,type:isNext?'correct':'feedback'}];
    const updMsgs=[...newMsgs,{role:'assistant',content:clean}];
    const updSkills={...S.skills};
    const q=S.passage.questions[S.qIndex];
    if(q.skill in updSkills){
      if(isNext){const pen=S.hintLevel*15;const sc=Math.max(40,100-pen);updSkills[q.skill]={score:updSkills[q.skill].attempts===0?sc:Math.round((updSkills[q.skill].score+sc)/2),attempts:updSkills[q.skill].attempts+1};}
      else{updSkills[q.skill]={score:Math.max(10,updSkills[q.skill].score-15),attempts:updSkills[q.skill].attempts+1};}
    }
    if(isDone||(isNext&&S.qIndex>=S.passage.questions.length-1)){
      set({chat:updChat,messages:updMsgs,skills:updSkills,loading:true,screen:'loading',loadingMsg:`Building ${S.name}'s reading profile...`});
      await generateResult(updMsgs,updSkills);
    } else if(isNext){
      const ni=S.qIndex+1;const nq=S.passage.questions[ni];
      const trans=`**Question ${ni+1} of ${S.passage.questions.length}:**\n${nq.text}`;
      set({chat:[...updChat,{r:'t',text:trans,type:'q'}],messages:[...updMsgs,{role:'assistant',content:trans}],qIndex:ni,hintLevel:0,skills:updSkills,loading:false});
    } else{
      set({chat:updChat,messages:updMsgs,skills:updSkills,loading:false});
    }
  }catch(e){
    const errMsg=`Sorry, I had a connection problem. Error: ${e.message}. Please try again.`;
    set({chat:[...newChat,{r:'t',text:errMsg,type:'error'}],messages:newMsgs,loading:false});
  }
}

async function generateResult(msgs,skills){
  try{
    const raw=await callAI(msgs,diagnosisSystem());
    const result=JSON.parse(raw.replace(/```json\n?|```\n?/g,'').trim());
    const sessions=JSON.parse(localStorage.getItem('rw_sessions')||'[]');
    sessions.push({name:S.name,age:S.age,level:S.level,storyTitle:S.passage.title,date:new Date().toLocaleDateString('en-AU',{day:'numeric',month:'short'}),levels:result.levels,superpower:result.superpower,rootGap:result.rootGap});
    localStorage.setItem('rw_sessions',JSON.stringify(sessions));
    set({screen:'results',result,loading:false});
  }catch(e){
    const levels=Object.entries(skills).map(([name,d])=>({name,score:d.attempts>0?d.score:60,observation:d.attempts>0?`${S.name} worked through this skill.`:'Not assessed this session.'}));
    set({screen:'results',result:{levels,superpower:'Dedicated and thoughtful reader',rootGap:'Continue reading varied texts to build all comprehension skills.',encouragement:`Well done, ${S.name}! You completed your reading session today. Every story makes you a stronger reader. Keep going!`},loading:false});
  }
}

function useHint(){
  const q=S.passage.questions[S.qIndex];
  const hi=Math.min(S.hintLevel,2);
  const labels=['💡 Gentle nudge','🔍 Here\'s a clue','📖 Let me guide you'];
  const msg=`${labels[hi]}: ${q.hints[hi]}`;
  set({chat:[...S.chat,{r:'t',text:msg,type:'hint'}],hintLevel:S.hintLevel+1});
}

function showTyping(){
  const win=document.getElementById('cw');
  if(!win)return;
  const el=document.createElement('div');
  el.id='typing';el.className='msg t';
  el.innerHTML=`<div class="m-av ta">🦉</div><div class="typing-wrap"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  win.appendChild(el);win.scrollTop=win.scrollHeight;
}

function fmt(t){return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');}

function colFor(s){return s>=70?{f:'#1D9E75',t:'#085041'}:s>=45?{f:'#EF9F27',t:'#633806'}:{f:'#D85A30',t:'#993C1D'};}

function render(){
  const app=document.getElementById('app');
  const badge=document.getElementById('navBadge');
  if(S.level&&LEVELS[S.level]){badge.textContent=`${LEVELS[S.level].icon} ${LEVELS[S.level].label}`;badge.style.display='inline';}else{badge.style.display='none';}

  if(S.screen==='welcome'){
    app.innerHTML=`<div class="screen">
<div class="welcome-hero"><span class="welcome-emoji">📖</span><h1>Your Personal Reading Tutor</h1><p>A story made just for you, a real conversation about it, and a complete picture of your reading superpowers.</p></div>
<div class="card">
  <label class="field-label">What's your name?</label>
  <input class="text-input" id="ni" type="text" placeholder="Type your name..." value="${S.name}" maxlength="30" autocomplete="off"/>
  <div class="gap"></div>
  <label class="field-label">How old are you?</label>
  <div class="age-row">${[5,6,7,8,9,10,11,12].map(a=>`<button class="age-btn ${S.age===a?'sel':''}" onclick="set({age:${a}})">${a}</button>`).join('')}</div>
  ${S.error?`<div class="error-box">${S.error}</div>`:''}
  <div class="gap"></div>
  <button class="btn-main" onclick="handleStart()">Let's go! →</button>
</div></div>`;
    const i=document.getElementById('ni');
    i.addEventListener('input',e=>{S.name=e.target.value;});
    i.addEventListener('keydown',e=>{if(e.key==='Enter')handleStart();});
    i.focus();
  }

  else if(S.screen==='level'){
    app.innerHTML=`<div class="screen">
<div class="welcome-hero" style="padding-top:1rem"><span class="welcome-emoji">🎯</span><h1>Choose your level!</h1><p>We've suggested one based on your age — but you can change it.</p></div>
<div class="level-grid">${Object.entries(LEVELS).map(([k,lv])=>`<div class="level-card ${S.level===k?'sel':''}" onclick="set({level:'${k}'})"><div class="lc-icon">${lv.icon}</div><div class="lc-name">${lv.label}</div><div class="lc-desc">Ages ${lv.ages} · ${lv.desc}</div></div>`).join('')}</div>
<button class="btn-main" onclick="startSession()">Start my story →</button></div>`;
  }

  else if(S.screen==='passage'){
    const lv=LEVELS[S.level];
    const fs=S.age<=7?'20px':S.age<=9?'17px':'16px';
    const lh=S.age<=7?'2.1':'1.9';
    const midSession=S.chat.length>0;
    const qNum=S.qIndex+1;
    const totalQ=S.passage.questions.length;
    app.innerHTML=`<div class="screen">
<div class="passage-meta"><span class="badge b-teal">${lv.icon} ${lv.label}</span><span class="badge b-amber">📝 ${S.passage.questions.length} questions</span></div>
<h2 class="passage-title">${S.passage.title}</h2>
<div class="passage-card"><p class="passage-text" style="font-size:${fs};line-height:${lh}">${S.passage.text}</p></div>
<div class="passage-tip"><span>💡</span><span>Read carefully! Your tutor will ask you ${S.passage.questions.length} questions. You can come back to re-read any time.</span></div>
${midSession
  ? `<div style="background:var(--forest-xlight);border-radius:11px;padding:0.85rem 1rem;margin-bottom:0.75rem;font-size:14px;color:var(--forest);font-weight:600">📍 You are on Question ${qNum} of ${totalQ}</div>
     <button class="btn-forest" onclick="set({screen:'tutor'})">← Back to Question ${qNum}</button>`
  : `<button class="btn-forest" onclick="beginTutoring()">I'm ready — let's go! →</button>`
}</div>`;
  }

  else if(S.screen==='tutor'){
    const q=S.passage.questions[S.qIndex];
    const pct=Math.round((S.qIndex/S.passage.questions.length)*100);
    const visibleChat=S.chat.slice(-4);
    const chatHTML=visibleChat.map(m=>{
      if(m.r==='t')return`<div class="msg t"><div class="m-av ta">🦉</div><div class="bubble">${fmt(m.text)}</div></div>`;
      return`<div class="msg c"><div class="m-av ca">⭐</div><div class="bubble">${fmt(m.text)}</div></div>`;
    }).join('');
    const skillsHTML=Object.entries(S.skills).filter(([,d])=>d.attempts>0).map(([name,d])=>{
      const col=colFor(d.score);
      return`<div class="sk-row"><span class="sk-name">${name}</span><div class="sk-track"><div class="sk-fill" style="width:${d.score}%;background:${col.f}"></div></div><span class="sk-score" style="color:${col.t}">${d.score}%</span></div>`;
    }).join('');

    app.innerHTML=`<div class="screen">
<div class="tutor-header">
  <div class="tutor-left"><div class="tutor-av">🦉</div><div><div class="tutor-name">ReadWise Tutor</div><div class="tutor-status">${S.loading?'Thinking...':'Ready'}</div></div></div>
  <button class="reread-btn" onclick="set({screen:'passage'})">← Re-read</button>
</div>
<div class="progress-row"><span>Question ${S.qIndex+1} of ${S.passage.questions.length}</span><span class="badge b-teal" style="font-size:11px">${q.skill}</span></div>
<div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
<div class="chat-win" id="cw">${chatHTML}</div>
<div class="input-wrap">
  <textarea class="chat-in" id="ci" placeholder="Write your answer here..." rows="1" ${S.loading?'disabled':''}></textarea>
  <button class="send-btn" onclick="doSend()" ${S.loading?'disabled':''}>→</button>
</div>
<div class="action-row">
  ${S.hintLevel<3&&!S.loading?`<button class="action-btn" onclick="useHint()">💡 Hint (${3-S.hintLevel} left)</button>`:''}
</div>
${skillsHTML?`<div class="skill-map"><div class="sm-title">Your understanding map</div>${skillsHTML}</div>`:''}
</div>`;
    const cw=document.getElementById('cw');
    if(cw){
      setTimeout(()=>{
        cw.scrollTop=cw.scrollHeight;
        const ci=document.getElementById('ci');
        if(ci) ci.scrollIntoView({behavior:'smooth',block:'end'});
      },100);
    }
    const ci=document.getElementById('ci');
    if(ci){
      ci.addEventListener('input',()=>{ci.style.height='auto';ci.style.height=ci.scrollHeight+'px';});
      ci.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}});
      if(!S.loading)ci.focus();
    }
  }

  else if(S.screen==='loading'){
    app.innerHTML=`<div class="loading"><div class="l-icon">✨</div><h2>${S.loadingMsg||'One moment...'}</h2><p>Just a moment, ${S.name}!</p><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  }

  else if(S.screen==='results'){
    const d=S.result;
    const bars=d.levels.map(lv=>{const col=colFor(lv.score);return`<div class="rb-row"><div class="rb-meta"><span class="rb-name">${lv.name}</span><span class="rb-score" style="color:${col.t}">${lv.score}%</span></div><div class="rb-track"><div class="rb-fill" style="width:${lv.score}%;background:${col.f}"></div></div><div class="rb-obs">${lv.observation}</div></div>`;}).join('');
    app.innerHTML=`<div class="screen">
<div class="r-hero"><span class="r-icon">🌟</span><h2>${S.name}'s Reading Profile</h2><p>From "${S.passage.title}"</p></div>
<div class="sp-card"><div class="sp-icon">⚡</div><div><div class="sp-label">Reading Superpower</div><div class="sp-text">${d.superpower}</div></div></div>
<div class="r-card"><div class="r-card-title">Comprehension Map</div>${bars}</div>
<div class="gap-card"><div class="gap-lbl">→ Next Focus</div><div class="gap-txt">${d.rootGap}</div></div>
<div class="enc-card"><p>"${d.encouragement}"</p></div>
<div class="r-btns">
  <button class="btn-again" onclick="tryAnother()">Try another story →</button>
  <button class="btn-ghost" onclick="goHome()">Start over</button>
</div></div>`;
  }
}

function doSend(){const ci=document.getElementById('ci');if(!ci)return;const v=ci.value.trim();if(!v||S.loading)return;ci.value='';ci.style.height='auto';sendAnswer(v);}
function tryAnother(){
  set({screen:'level',passage:null,chat:[],messages:[],qIndex:0,hintLevel:0,skills:freshSkills(),result:null,error:'',loading:false});
}
function goHome(){set({screen:'welcome',level:null,passage:null,chat:[],messages:[],qIndex:0,hintLevel:0,skills:freshSkills(),result:null,error:'',loading:false});}

const saved=localStorage.getItem('rw_child');
if(saved){try{const c=JSON.parse(saved);S.name=c.name||'';S.age=c.age||8;}catch{}}
render();
</script>
</body>
</html>
