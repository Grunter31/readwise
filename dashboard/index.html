<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Burrow — My Math Journey</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,500;9..144,600;9..144,700;9..144,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --parchment:#F8F4EC;
  --parchment-dark:#EFE9DC;
  --parchment-deep:#E5DCC8;
  --ink:#1A1815;
  --ink-mid:#3F3B34;
  --ink-soft:#76706A;
  --ink-faint:#A39E96;
  --rust:#B8451F;
  --rust-dark:#8E3215;
  --rust-light:#F4D9CC;
  --rust-xlight:#FBEDE5;
  --sage:#5A7A5C;
  --sage-dark:#3E5A40;
  --sage-light:#D6E2D2;
  --sage-xlight:#EAF1E6;
  --gold:#C99A2D;
  --gold-light:#F4E5BA;
  --rose:#9C5466;
  --white:#FFFFFF;
  --border:rgba(26,24,21,0.10);
  --border-strong:rgba(26,24,21,0.18);
  --shadow-sm:0 1px 2px rgba(26,24,21,0.06);
  --shadow:0 4px 18px rgba(26,24,21,0.08);
  --shadow-lg:0 12px 36px rgba(26,24,21,0.12);
}
html{scroll-behavior:smooth}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--parchment);
  color:var(--ink);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  font-feature-settings:"ss01","cv11";
}

/* NAV */
nav{
  background:rgba(248,244,236,0.92);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:0 5%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:62px;
  position:sticky;
  top:0;
  z-index:100;
}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink)}
.nav-logo-mark{width:30px;height:30px;flex-shrink:0}
.nav-logo-text{font-family:'Fraunces',serif;font-weight:700;font-size:21px;letter-spacing:-0.01em}
.nav-logo-text em{font-style:italic;font-weight:600;color:var(--rust)}
.nav-cta{
  background:var(--rust);
  color:var(--white);
  padding:9px 22px;
  border-radius:99px;
  font-size:14px;
  font-weight:600;
  text-decoration:none;
  transition:background 0.18s;
}
.nav-cta:hover{background:var(--rust-dark)}

.wrap{max-width:760px;margin:0 auto;padding:2.25rem 1.25rem 5rem}
.screen{animation:fadeUp 0.4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* SETUP */
.setup-hero{text-align:center;margin-bottom:2rem;padding-top:0.5rem}
.setup-mark{width:64px;height:64px;margin:0 auto 1rem}
.setup-hero h1{
  font-family:'Fraunces',serif;
  font-weight:700;
  font-size:32px;
  color:var(--ink);
  margin-bottom:0.6rem;
  letter-spacing:-0.02em;
  line-height:1.15;
}
.setup-hero h1 em{font-style:italic;color:var(--rust);font-weight:600}
.setup-hero p{font-size:16px;color:var(--ink-mid);max-width:430px;margin:0 auto;line-height:1.65}
.setup-card{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:18px;
  padding:1.75rem;
  box-shadow:var(--shadow-sm);
}
.field-label{
  display:block;
  font-size:12px;
  font-weight:700;
  color:var(--ink-soft);
  text-transform:uppercase;
  letter-spacing:0.08em;
  margin-bottom:8px;
}
.text-input{
  width:100%;
  padding:13px 16px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:17px;
  border:1.5px solid var(--border);
  border-radius:12px;
  background:var(--parchment);
  color:var(--ink);
  outline:none;
  transition:border-color 0.18s,background 0.18s;
}
.text-input:focus{border-color:var(--rust);background:var(--white)}
.gap{height:18px}
.btn-main{
  width:100%;
  padding:15px;
  background:var(--rust);
  color:var(--white);
  border:none;
  border-radius:13px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:700;
  font-size:16px;
  cursor:pointer;
  transition:all 0.16s;
  box-shadow:0 4px 18px rgba(184,69,31,0.24);
  text-decoration:none;
  display:inline-block;
  text-align:center;
}
.btn-main:hover{background:var(--rust-dark);transform:translateY(-1px)}

/* DASH HEADER */
.dash-header{margin-bottom:1.75rem}
.dash-greeting{
  font-family:'Fraunces',serif;
  font-weight:700;
  font-size:30px;
  color:var(--ink);
  margin-bottom:5px;
  letter-spacing:-0.02em;
  line-height:1.15;
}
.dash-greeting em{font-style:italic;color:var(--rust);font-weight:600}
.dash-sub{font-size:15px;color:var(--ink-soft);font-weight:500}

/* STAT CARDS */
.stats-row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-bottom:1.25rem;
}
.stat-card{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:14px;
  padding:1.1rem 0.85rem;
  text-align:center;
  box-shadow:var(--shadow-sm);
}
.stat-num{
  font-family:'Fraunces',serif;
  font-weight:700;
  font-size:30px;
  color:var(--rust);
  line-height:1;
  margin-bottom:5px;
  letter-spacing:-0.01em;
}
.stat-label{
  font-size:12px;
  color:var(--ink-soft);
  font-weight:600;
  letter-spacing:0.02em;
}

/* START NEW */
.start-card{
  background:var(--ink);
  border-radius:18px;
  padding:1.5rem 1.75rem;
  margin-bottom:1.25rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  flex-wrap:wrap;
  position:relative;
  overflow:hidden;
}
.start-card::before{
  content:'';
  position:absolute;
  right:-30px;
  top:-30px;
  width:140px;
  height:140px;
  border-radius:50%;
  background:rgba(184,69,31,0.18);
  pointer-events:none;
}
.start-card-text h3{
  font-family:'Fraunces',serif;
  font-weight:700;
  font-size:20px;
  color:var(--white);
  margin-bottom:5px;
  letter-spacing:-0.01em;
  position:relative;
  z-index:1;
}
.start-card-text p{
  font-size:14px;
  color:rgba(248,244,236,0.65);
  line-height:1.5;
  position:relative;
  z-index:1;
}
.btn-start{
  background:var(--rust);
  color:var(--white);
  padding:12px 24px;
  border-radius:99px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:700;
  font-size:14px;
  text-decoration:none;
  white-space:nowrap;
  transition:all 0.16s;
  box-shadow:0 4px 18px rgba(184,69,31,0.32);
  position:relative;
  z-index:1;
  letter-spacing:-0.005em;
}
.btn-start:hover{background:var(--rust-dark);transform:translateY(-1px)}

/* SECTIONS */
.section-title{
  font-family:'Fraunces',serif;
  font-weight:700;
  font-size:20px;
  color:var(--ink);
  margin-bottom:0.85rem;
  margin-top:0.5rem;
  letter-spacing:-0.015em;
}

/* SUPERPOWER BANNER */
.sp-banner{
  background:linear-gradient(135deg,var(--gold-light) 0%,#FAF0CD 100%);
  border-radius:14px;
  padding:1.1rem 1.4rem;
  margin-bottom:1rem;
  display:flex;
  align-items:center;
  gap:14px;
  border:1px solid rgba(201,154,45,0.25);
}
.sp-banner .sp-icon{font-size:26px;flex-shrink:0;line-height:1}
.sp-banner .sp-label{
  font-size:11px;
  font-weight:700;
  color:#7a5d18;
  text-transform:uppercase;
  letter-spacing:0.09em;
  margin-bottom:3px;
}
.sp-banner .sp-text{
  font-family:'Fraunces',serif;
  font-size:17px;
  font-weight:700;
  color:#3d2e0a;
  letter-spacing:-0.01em;
}

/* PROFILE CARD */
.profile-card{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:18px;
  padding:1.5rem;
  margin-bottom:1rem;
  box-shadow:var(--shadow-sm);
}
.profile-card-meta{
  font-size:11px;
  font-weight:700;
  color:var(--ink-soft);
  text-transform:uppercase;
  letter-spacing:0.09em;
  margin-bottom:1.1rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.profile-card-date{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  font-weight:600;
  color:var(--ink-faint);
  letter-spacing:0.04em;
}
.bar-row{margin-bottom:14px}
.bar-row:last-child{margin-bottom:0}
.bar-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.bar-name{font-size:13px;font-weight:600;color:var(--ink);letter-spacing:-0.005em}
.bar-score{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600}
.bar-track{height:8px;background:var(--parchment-dark);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width 0.9s ease}

/* GAP CARD */
.gap-card{
  background:var(--sage-xlight);
  border:1px solid var(--sage-light);
  border-radius:14px;
  padding:1.1rem 1.35rem;
  margin-bottom:1.25rem;
}
.gap-lbl{
  font-size:11px;
  font-weight:700;
  color:var(--sage-dark);
  text-transform:uppercase;
  letter-spacing:0.09em;
  margin-bottom:6px;
}
.gap-txt{
  font-size:15px;
  color:#1F3320;
  line-height:1.6;
  font-weight:500;
}

/* PROGRESS OVER TIME */
.progress-section{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:18px;
  padding:1.5rem;
  margin-bottom:1.25rem;
  box-shadow:var(--shadow-sm);
}
.progress-title{
  font-size:11px;
  font-weight:700;
  color:var(--ink-soft);
  text-transform:uppercase;
  letter-spacing:0.09em;
  margin-bottom:1.4rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.progress-title-count{
  font-family:'JetBrains Mono',monospace;
  font-weight:600;
  color:var(--ink-faint);
}
.progress-skill-row{margin-bottom:1.1rem}
.progress-skill-row:last-child{margin-bottom:0}
.progress-skill-name{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  margin-bottom:7px;
}
.progress-skill-label{font-size:13px;font-weight:600;color:var(--ink);letter-spacing:-0.005em}
.progress-skill-latest{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  font-weight:600;
}
.mini-bars{display:flex;gap:5px;align-items:flex-end;height:48px}
.mini-bar-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  flex:1;
  min-width:18px;
}
.mini-bar{
  width:100%;
  border-radius:4px 4px 0 0;
  transition:height 0.5s ease;
  min-height:4px;
  position:relative;
}
.mini-bar:hover::after{
  content:attr(data-score) '%';
  position:absolute;
  bottom:100%;
  left:50%;
  transform:translateX(-50%);
  background:var(--ink);
  color:var(--white);
  padding:3px 7px;
  border-radius:5px;
  font-size:10px;
  font-family:'JetBrains Mono',monospace;
  margin-bottom:4px;
  white-space:nowrap;
  pointer-events:none;
}
.mini-bar-label{
  font-size:10px;
  color:var(--ink-faint);
  font-family:'JetBrains Mono',monospace;
}

/* SESSION HISTORY */
.history-list{display:flex;flex-direction:column;gap:10px;margin-bottom:1.5rem}
.history-card{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:13px;
  padding:0.95rem 1.2rem;
  display:flex;
  align-items:center;
  gap:14px;
  transition:all 0.16s;
  box-shadow:var(--shadow-sm);
}
.history-card:hover{transform:translateX(2px);box-shadow:var(--shadow)}
.history-num{
  width:38px;
  height:38px;
  border-radius:11px;
  background:var(--rust-xlight);
  color:var(--rust-dark);
  font-family:'Fraunces',serif;
  font-weight:700;
  font-size:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  letter-spacing:-0.01em;
}
.history-info{flex:1;min-width:0}
.history-title{
  font-family:'Fraunces',serif;
  font-size:15px;
  font-weight:700;
  color:var(--ink);
  margin-bottom:2px;
  letter-spacing:-0.005em;
}
.history-meta{
  font-size:12px;
  color:var(--ink-soft);
  display:flex;
  gap:8px;
  align-items:center;
}
.history-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--ink-faint)}
.history-avg{
  font-family:'JetBrains Mono',monospace;
  font-weight:600;
  font-size:18px;
}

/* EMPTY STATE */
.empty-state{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:18px;
  padding:2.5rem 2rem;
  text-align:center;
  margin-bottom:1rem;
  box-shadow:var(--shadow-sm);
}
.empty-mark{width:56px;height:56px;margin:0 auto 1rem;opacity:0.7}
.empty-state h3{
  font-family:'Fraunces',serif;
  font-weight:700;
  font-size:21px;
  color:var(--ink);
  margin-bottom:0.6rem;
  letter-spacing:-0.01em;
}
.empty-state p{
  font-size:15px;
  color:var(--ink-soft);
  margin-bottom:1.5rem;
  max-width:340px;
  margin-left:auto;
  margin-right:auto;
  line-height:1.6;
}

/* RESET BTN */
.reset-btn{
  background:none;
  border:none;
  font-size:12px;
  color:var(--ink-faint);
  cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;
  display:block;
  margin:1.5rem auto 0;
  padding:8px 14px;
  transition:color 0.18s;
}
.reset-btn:hover{color:var(--rust)}

/* TIPS / FOOTER NOTE */
.foot-note{
  font-size:12px;
  color:var(--ink-faint);
  text-align:center;
  margin-top:2rem;
  font-style:italic;
}

@media(max-width:520px){
  .stats-row{grid-template-columns:repeat(3,1fr);gap:8px}
  .stat-card{padding:0.9rem 0.4rem}
  .stat-num{font-size:24px}
  .stat-label{font-size:10px}
  .start-card{padding:1.3rem 1.4rem}
  .dash-greeting{font-size:24px}
  .progress-skill-row{margin-bottom:1.4rem}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo" aria-label="Burrow home">
    <svg class="nav-logo-mark" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M22 6 C20 6, 18 9, 18 14 L18 26 C18 30, 20 32, 22 32 C24 32, 26 30, 26 26 L26 14 C26 9, 24 6, 22 6 Z" fill="#1A1815"/>
      <path d="M22 11 C21 11, 20.5 13, 20.5 16 L20.5 24 C20.5 26, 21 27, 22 27 C23 27, 23.5 26, 23.5 24 L23.5 16 C23.5 13, 23 11, 22 11 Z" fill="#B8451F"/>
      <g transform="rotate(12 42 14)">
        <path d="M42 6 C40 6, 38 9, 38 14 L38 26 C38 30, 40 32, 42 32 C44 32, 46 30, 46 26 L46 14 C46 9, 44 6, 42 6 Z" fill="#1A1815"/>
        <path d="M42 11 C41 11, 40.5 13, 40.5 16 L40.5 24 C40.5 26, 41 27, 42 27 C43 27, 43.5 26, 43.5 24 L43.5 16 C43.5 13, 43 11, 42 11 Z" fill="#B8451F"/>
      </g>
      <ellipse cx="32" cy="42" rx="17" ry="16" fill="#1A1815"/>
      <circle cx="26" cy="40" r="1.6" fill="#F8F4EC"/>
      <circle cx="38" cy="40" r="1.6" fill="#F8F4EC"/>
      <ellipse cx="32" cy="46" rx="1.4" ry="1" fill="#B8451F"/>
      <path d="M30 48 Q32 50 34 48" stroke="#F8F4EC" stroke-width="0.8" stroke-linecap="round" fill="none"/>
    </svg>
    <span class="nav-logo-text">Bur<em>row</em></span>
  </a>
  <a href="/app" class="nav-cta">New session →</a>
</nav>

<div class="wrap" id="app"></div>

<script>
const SKILLS = ['Number Sense','Word Problems','Pattern & Logic','Geometry & Measurement','Fractions & Decimals','Mental Math'];

const LEVELS = {
  foundations:{label:'Foundations',num:'01'},
  building:{label:'Building',num:'02'},
  stretching:{label:'Stretching',num:'03'},
  advanced:{label:'Advanced',num:'04'}
};

/* STORAGE */
function getSessions(){
  try{return JSON.parse(localStorage.getItem('burrow_sessions')||'[]');}
  catch{return [];}
}
function getChild(){
  try{return JSON.parse(localStorage.getItem('burrow_child')||'null');}
  catch{return null;}
}
function saveChild(c){
  const existing = getChild() || {};
  localStorage.setItem('burrow_child', JSON.stringify({...existing,...c}));
}

/* STATE */
let state = {
  screen:'loading',
  child:null,
  sessions:[],
  setupName:'',
};

function setState(u){state = {...state,...u};render();}

function init(){
  const child = getChild();
  const sessions = getSessions();
  if(child && child.name){
    setState({screen:'dashboard',child,sessions});
  } else {
    setState({screen:'setup'});
  }
}

function setupDone(){
  const name = state.setupName.trim();
  if(!name){render();return;}
  const child = {name};
  saveChild(child);
  setState({screen:'dashboard',child,sessions:getSessions()});
}

function avgScore(session){
  if(!session.skills || !session.skills.length) return 0;
  return Math.round(session.skills.reduce((a,s)=>a+(s.score||0),0)/session.skills.length);
}

function colFor(s){
  if(s>=70) return {f:'#5A7A5C',t:'#2E4530'};
  if(s>=45) return {f:'#C99A2D',t:'#7A5D18'};
  return {f:'#B8451F',t:'#8E3215'};
}

function greetingFor(){
  const h = new Date().getHours();
  if(h<12) return 'Good morning';
  if(h<17) return 'Good afternoon';
  return 'Good evening';
}

function resetAll(){
  if(confirm('This will clear all your math history and sign you out. Are you sure?')){
    localStorage.removeItem('burrow_sessions');
    localStorage.removeItem('burrow_child');
    setState({screen:'setup',child:null,sessions:[],setupName:''});
  }
}

/* RABBIT SVG */
const RABBIT = `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <path d="M22 6 C20 6, 18 9, 18 14 L18 26 C18 30, 20 32, 22 32 C24 32, 26 30, 26 26 L26 14 C26 9, 24 6, 22 6 Z" fill="#1A1815"/>
  <path d="M22 11 C21 11, 20.5 13, 20.5 16 L20.5 24 C20.5 26, 21 27, 22 27 C23 27, 23.5 26, 23.5 24 L23.5 16 C23.5 13, 23 11, 22 11 Z" fill="#B8451F"/>
  <g transform="rotate(12 42 14)">
    <path d="M42 6 C40 6, 38 9, 38 14 L38 26 C38 30, 40 32, 42 32 C44 32, 46 30, 46 26 L46 14 C46 9, 44 6, 42 6 Z" fill="#1A1815"/>
    <path d="M42 11 C41 11, 40.5 13, 40.5 16 L40.5 24 C40.5 26, 41 27, 42 27 C43 27, 43.5 26, 43.5 24 L43.5 16 C43.5 13, 43 11, 42 11 Z" fill="#B8451F"/>
  </g>
  <ellipse cx="32" cy="42" rx="17" ry="16" fill="#1A1815"/>
  <circle cx="26" cy="40" r="1.6" fill="#F8F4EC"/>
  <circle cx="38" cy="40" r="1.6" fill="#F8F4EC"/>
  <ellipse cx="32" cy="46" rx="1.4" ry="1" fill="#B8451F"/>
  <path d="M30 48 Q32 50 34 48" stroke="#F8F4EC" stroke-width="0.8" stroke-linecap="round" fill="none"/>
</svg>`;

/* RENDER */
function render(){
  const app = document.getElementById('app');
  const s = state;

  if(s.screen === 'loading'){
    app.innerHTML = `<div style="display:flex;justify-content:center;align-items:center;min-height:60vh;color:var(--ink-faint)">Loading...</div>`;
    return;
  }

  if(s.screen === 'setup'){
    app.innerHTML = `
<div class="screen">
  <div class="setup-hero">
    <div class="setup-mark">${RABBIT}</div>
    <h1>Make this <em>yours</em>.</h1>
    <p>Your dashboard tracks every session and shows how your reasoning gets sharper over time.</p>
  </div>
  <div class="setup-card">
    <label class="field-label" for="nameIn">What's your name?</label>
    <input class="text-input" id="nameIn" type="text" placeholder="Type your name..." value="${s.setupName||''}" maxlength="30" autocomplete="off"/>
    <div class="gap"></div>
    <button class="btn-main" onclick="setupDone()">Create my dashboard →</button>
  </div>
</div>`;
    const inp = document.getElementById('nameIn');
    inp.addEventListener('input', e=>{state.setupName = e.target.value;});
    inp.addEventListener('keydown', e=>{if(e.key==='Enter') setupDone();});
    inp.focus();
    return;
  }

  if(s.screen === 'dashboard'){
    const {child,sessions} = s;
    const total = sessions.length;
    const hasHistory = total > 0;
    const latest = hasHistory ? sessions[sessions.length-1] : null;
    const avgOverall = hasHistory
      ? Math.round(sessions.reduce((a,sess)=>a+avgScore(sess),0)/total)
      : 0;

    /* level played most recently */
    const recentLevel = latest ? (latest.level || 'foundations') : 'foundations';
    const recentLevelLabel = LEVELS[recentLevel]?.label || 'Foundations';

    /* build progress chart data: last 6 sessions, one mini-bar per session per skill */
    const last6 = sessions.slice(-6);

    const progressBars = (hasHistory && total >= 1) ? `
<div class="progress-section">
  <div class="progress-title">
    <span>Reasoning over time</span>
    <span class="progress-title-count">last ${last6.length} session${last6.length===1?'':'s'}</span>
  </div>
  ${SKILLS.map((skName,si)=>{
    const bars = last6.map((sess,sessIdx)=>{
      const skill = sess.skills ? sess.skills.find(k=>k.name===skName) : null;
      const score = skill ? skill.score : 0;
      const col = colFor(score);
      return `<div class="mini-bar-wrap"><div class="mini-bar" data-score="${score}" style="height:${Math.max(score*0.42,4)}px;background:${col.f}"></div><div class="mini-bar-label">${sessIdx+1}</div></div>`;
    }).join('');
    /* pad if fewer than 6 sessions */
    const padCount = 6 - last6.length;
    const pads = Array(padCount).fill(0).map(()=>`<div class="mini-bar-wrap"><div class="mini-bar" style="height:4px;background:var(--parchment-deep);opacity:0.4"></div><div class="mini-bar-label" style="opacity:0.3">·</div></div>`).join('');

    const latestSkill = latest && latest.skills ? latest.skills.find(k=>k.name===skName) : null;
    const latestScore = latestSkill ? latestSkill.score : 0;
    const col = colFor(latestScore);
    return `
<div class="progress-skill-row">
  <div class="progress-skill-name">
    <span class="progress-skill-label">${skName}</span>
    <span class="progress-skill-latest" style="color:${col.t}">${latestScore}%</span>
  </div>
  <div class="mini-bars">${bars}${pads}</div>
</div>`;
  }).join('')}
</div>` : '';

    const historyCards = hasHistory ? sessions.slice().reverse().slice(0,8).map((sess,i)=>{
      const num = total - i;
      const avg = avgScore(sess);
      const col = colFor(avg);
      const lvLabel = LEVELS[sess.level]?.label || sess.level || '';
      return `
<div class="history-card">
  <div class="history-num">${num}</div>
  <div class="history-info">
    <div class="history-title">${lvLabel} · Session ${num}</div>
    <div class="history-meta">
      <span>${sess.dateLabel || 'Recent'}</span>
      ${sess.superpower?`<span class="dot"></span><span>${sess.superpower}</span>`:''}
    </div>
  </div>
  <div class="history-avg" style="color:${col.t}">${avg}%</div>
</div>`;
    }).join('') : '';

    const latestProfile = latest ? `
<div class="sp-banner">
  <div class="sp-icon">⚡</div>
  <div>
    <div class="sp-label">Math superpower</div>
    <div class="sp-text">${latest.superpower || 'Strong reasoning'}</div>
  </div>
</div>

<div class="profile-card">
  <div class="profile-card-meta">
    <span>Latest reasoning map</span>
    <span class="profile-card-date">${latest.dateLabel || ''} · ${LEVELS[latest.level]?.label || ''}</span>
  </div>
  ${(latest.skills || []).map(sk=>{
    const col = colFor(sk.score);
    return `
<div class="bar-row">
  <div class="bar-meta">
    <span class="bar-name">${sk.name}</span>
    <span class="bar-score" style="color:${col.t}">${sk.score}%</span>
  </div>
  <div class="bar-track"><div class="bar-fill" style="width:${sk.score}%;background:${col.f}"></div></div>
</div>`;
  }).join('')}
</div>

<div class="gap-card">
  <div class="gap-lbl">→ Next focus</div>
  <div class="gap-txt">${latest.rootGap || 'Keep practising across all skills.'}</div>
</div>` : `
<div class="empty-state">
  <div class="empty-mark">${RABBIT}</div>
  <h3>No sessions yet</h3>
  <p>Start your first math session — you'll see your reasoning profile here straight after.</p>
  <a href="/app" class="btn-main" style="max-width:240px">Start first session →</a>
</div>`;

    app.innerHTML = `
<div class="screen">
  <div class="dash-header">
    <div class="dash-greeting">${greetingFor()}, <em>${child.name}</em>.</div>
    <div class="dash-sub">${hasHistory ? recentLevelLabel + ' level · Your reasoning journey' : 'Welcome to your dashboard'}</div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num">${total}</div>
      <div class="stat-label">Sessions</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">${hasHistory ? avgOverall + '%' : '—'}</div>
      <div class="stat-label">Average</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">${hasHistory ? recentLevelLabel.charAt(0) : '—'}</div>
      <div class="stat-label">Current Level</div>
    </div>
  </div>

  <div class="start-card">
    <div class="start-card-text">
      <h3>${hasHistory ? 'Ready for another?' : 'Start your first session'}</h3>
      <p>${hasHistory ? 'Six fresh problems, every time.' : 'Six problems, one of each skill.'}</p>
    </div>
    <a href="/app" class="btn-start">${hasHistory?'New session →':'Begin →'}</a>
  </div>

  ${hasHistory ? `<div class="section-title">Your latest profile</div>` : ''}
  ${latestProfile}

  ${progressBars}

  ${hasHistory ? `<div class="section-title">Session history</div><div class="history-list">${historyCards}</div>` : ''}

  <button class="reset-btn" onclick="resetAll()">Clear my data</button>
  ${hasHistory ? `<p class="foot-note">All progress is saved locally on this device.</p>` : ''}
</div>`;
  }
}

init();
</script>
</body>
</html>
